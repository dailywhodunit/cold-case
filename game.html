function getInsight(clues, idA, idB) {
  const c=clues.find(x=>x.id===idA);
  const lnk=c?.links?.find(l=>l.with===idB);
  if (lnk) return lnk.insight;
  const c2=clues.find(x=>x.id===idB);
  return c2?.links?.find(l=>l.with===idA)?.insight||null;
}

function useTimer(start, running, onExpire) {
  const [rem,setRem]=useState(start);
  useEffect(()=>{
    setRem(start);
  },[start]);
  useEffect(()=>{
    if (!running) return;
    const id=setInterval(()=>{ setRem(r=>{ if(r<=1){clearInterval(id);onExpire();return 0;} return r-1; }); },1000);
    return ()=>clearInterval(id);
  },[running]);
  const addPenalty=n=>setRem(r=>Math.max(0,r-n));
  const mm=String(Math.floor(rem/60)).padStart(2,"0");
  const ss=String(rem%60).padStart(2,"0");
  return { rem, display:`${mm}:${ss}`, urgent:rem<=120, critical:rem<=30, addPenalty };
}

// ─── GAME SCREEN ──────────────────────────────────────────────────────────────
function GameScreen({ tierId, onSolve, onTimeout, onReset }) {
  const caseData = TIERS[tierId];
  const { clues, categories, solution, theme, timerSeconds } = caseData;

  const initMarks=()=>{ const m={}; categories.forEach(cat=>{m[cat.key]={}; cat.items.forEach(i=>{m[cat.key][i.name]=0;})}); return m; };

  const [marks,        setMarks]        = useState(initMarks);
  const [answerOpen,   setAnswerOpen]   = useState(true);
  const [revealedIds,  setRevealedIds]  = useState(new Set());
  const [feedItems,    setFeedItems]    = useState([]);
  const [linkedPairs,  setLinkedPairs]  = useState(new Set());
  const [wrongShake,   setWrongShake]   = useState(false);
  const [wrongCount,   setWrongCount]   = useState(0);
  const [totalPenalty, setTotalPenalty] = useState(0);
  const [newItemId,    setNewItemId]    = useState(null);
  const [paused,       setPaused]       = useState(false);
  const [clueOpen,     setClueOpen]     = useState({});
  const [aloneOpen,    setAloneOpen]    = useState({});
  const [hintedClues,  setHintedClues]  = useState(new Set());
  const [hintsUsed,    setHintsUsed]    = useState(0);
  const [timerOn,      setTimerOn]      = useState(true);

  const nextIdx     = clues.findIndex(c=>!revealedIds.has(c.id));
  const allRevealed = nextIdx===-1;
  const totalInsights = clues.reduce((n,c)=>n+(c.links?.length||0),0)/2;
  const foundInsights = linkedPairs.size;
  const accent = theme.accent;
  const tierInfo = TIERS[tierId];

  const { rem, display, urgent, critical, addPenalty } = useTimer(timerSeconds, timerOn&&!paused, onTimeout);
  const timerColor = critical?C.red:urgent?C.gold:accent;

  const cycleMark=(catKey,itemName)=>{
    setMarks(prev=>{
      const cur=prev[catKey][itemName]||0;
      const next=(cur+1)%4;
      const newCat={...prev[catKey],[itemName]:next};
      if(next===2) Object.keys(newCat).forEach(n=>{ if(n!==itemName&&newCat[n]===2) newCat[n]=1; });
      return {...prev,[catKey]:newCat};
    });
  };

  const getConfirmed=()=>{
    const r={};
    categories.forEach(cat=>{
      const found=cat.items.find(i=>(marks[cat.key]?.[i.name]||0)===2);
      r[cat.key]=found?.name||null;
    });
    return r;
  };

  const revealNext=()=>{
    if(allRevealed) return;
    const clue=clues[nextIdx];
    setRevealedIds(prev=>new Set([...prev,clue.id]));
    setFeedItems(prev=>[...prev,{type:"clue",id:clue.id}]);
    setNewItemId(clue.id);
    setAnswerOpen(false);
    setClueOpen(prev=>{ const n={}; Object.keys(prev).forEach(id=>{n[id]=false;}); n[clue.id]=true; return n; });
    setAloneOpen(prev=>({...prev,[clue.id]:false}));
    setTimeout(()=>setNewItemId(null),700);
  };

  const handleToggleAlone=(clueId)=>{
    const isOpening=!aloneOpen[clueId];
    if(isOpening&&!hintedClues.has(clueId)){ addPenalty(15); setHintsUsed(h=>h+1); setHintedClues(prev=>new Set([...prev,clueId])); }
    setAloneOpen(prev=>({...prev,[clueId]:!aloneOpen[clueId]}));
  };

  const handleLink=(idA,idB)=>{
    const key=[idA,idB].sort().join("+");
    if(linkedPairs.has(key)) return;
    const insight=getInsight(clues,idA,idB); if(!insight) return;
    const clueA=clues.find(c=>c.id===idA),clueB=clues.find(c=>c.id===idB);
    setLinkedPairs(prev=>new Set([...prev,key]));
    setFeedItems(prev=>{ const iA=prev.findIndex(i=>i.id===idA),iB=prev.findIndex(i=>i.id===idB); const n=[...prev]; n.splice(Math.max(iA,iB)+1,0,{type:"insight",id:key,clueA,clueB,insight}); return n; });
    setNewItemId(key); setTimeout(()=>setNewItemId(null),800);
  };

  const submit=()=>{
    const confirmed=getConfirmed();
    const correct=categories.every(cat=>confirmed[cat.key]===solution[cat.key]);
    if(correct){ setTimerOn(false); onSolve({accusation:confirmed,foundInsights,wrongCount,totalPenalty,timeRemaining:rem,hintsUsed,tierId}); }
    else{ setWrongShake(true); setWrongCount(w=>w+1); setTotalPenalty(p=>p+30); addPenalty(30); setTimeout(()=>setWrongShake(false),500); }
  };

  return (
    <div style={{ minHeight:"100vh",backgroundColor:theme.bg,position:"relative" }}>
      <Grain/>
      {paused&&<AdOverlay onResume={()=>setPaused(false)}/>}
      <style>{`
        @keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
// ─── DAILY CASE LOADER ────────────────────────────────────────────────────────
// Fetches /cases/YYYY-MM-DD.json and normalizes it into TIERS format.
// Falls back to FALLBACK_TIERS (Last Order) if no case exists for today.

function getTodayString() {
  const d = new Date();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${d.getFullYear()}-${mm}-${dd}`;
}

function normItem(item) {
  if (!item) return {name:"",icon:"",detail:""};
  if (Array.isArray(item)) return {name:String(item[0]||""),icon:String(item[1]||""),detail:String(item[2]||"")};
  if (typeof item === "string") return {name:item,icon:"",detail:""};
  return {
    name:   item.name   || item.title  || item.label || item.value || "",
    icon:   item.icon   || item.emoji  || "",
    detail: item.detail || item.description || item.role || item.hint || "",
  };
}

function normalizeTier(d) {
  if (!d) return null;

  // Flavor
  const flavor = d.flavor || d.description || d.intro || d.premise || d.flavorText || d.synopsis || "";

  // Categories — handle array OR nested-object format
  let cats = [];
  const catsRaw = d.categories || [];
  if (!Array.isArray(catsRaw) && typeof catsRaw === "object") {
    Object.keys(catsRaw).forEach(catKey => {
      const catObj = catsRaw[catKey];
      if (!catObj || typeof catObj !== "object") return;
      const items = [];
      Object.keys(catObj).forEach(ik => {
        if (["name","label","icon","emoji","detail","description"].includes(ik)) return;
        const v = catObj[ik];
        if (v && typeof v === "object" && !Array.isArray(v)) items.push(normItem(v));
        else if (typeof v === "string") items.push({name:v,icon:"",detail:""});
      });
      if (!items.length) {
        (catObj.items||catObj.options||catObj.choices||[]).forEach(i=>items.push(normItem(i)));
      }
      cats.push({key:catKey, label:catObj.name||catObj.label||catKey, icon:catObj.icon||catObj.emoji||"", items});
    });
  } else {
    cats = catsRaw.map(cat => {
      if (Array.isArray(cat)) return {key:cat[0]||"",label:cat[1]||"",icon:cat[2]||"",items:(cat[3]||[]).map(normItem)};
      const items = (cat.items||cat.options||cat.choices||[]).map(normItem);
      return {key:cat.key||cat.id||"",label:cat.label||cat.title||cat.name||cat.key||"",icon:cat.icon||cat.emoji||"",items};
    });
  }

  // Clues — handle array OR object format
  let clues = [];
  const cluesRaw = d.clues || [];
  const cluesList = Array.isArray(cluesRaw) ? cluesRaw : Object.values(cluesRaw);
  clues = cluesList.map(cl => {
    if (!cl) return null;
    if (Array.isArray(cl)) return {id:cl[0]||"",type:cl[1]||"document",icon:cl[2]||"📋",heading:cl[3]||"",text:cl[4]||"",alone:cl[5]||"",links:cl[6]||[]};
    const linksRaw = cl.links || cl.connections || cl.pairs || [];
    const links = linksRaw.map(l => {
      if (typeof l === "string") return {with:l, insight:""};
      return {with:l.with||l.id||l.clue||"", insight:l.insight||l.combined||l.reveal||""};
    });
    return {
      id:      cl.id      || cl.clueId  || "",
      type:    cl.type    || cl.clueType || "document",
      icon:    cl.icon    || cl.emoji   || "📋",
      heading: cl.heading || cl.title   || cl.source || cl.name || "",
      text:    cl.text    || cl.content || cl.clue   || "",
      alone:   cl.alone   || cl.hint    || cl.interpretation || "",
      links,
    };
  }).filter(Boolean);

  // Solution — normalize key aliases
  const solRaw = d.solution || {};
  const sol = {...solRaw};
  const solAliases = {killer:"suspect",murderer:"suspect",culprit:"suspect",
    weapon:"method",cause:"method",evidence:"method",means:"method",instrument:"method",
    place:"location",where:"location",room:"location",scene:"location",
    time:"window",when:"window"};
  Object.keys(solAliases).forEach(ak => {
    if (sol[ak] !== undefined && sol[solAliases[ak]] === undefined) sol[solAliases[ak]] = sol[ak];
  });
  // Also align with actual category keys
  cats.forEach(cat => {
    if (sol[cat.key] === undefined) {
      if (sol[cat.key+"s"] !== undefined) sol[cat.key] = sol[cat.key+"s"];
      else if (cat.key.endsWith("s") && sol[cat.key.slice(0,-1)] !== undefined) sol[cat.key] = sol[cat.key.slice(0,-1)];
    }
  });

  const tier = d.tier || "rookie";
  const tierMeta = {
    rookie:    {stars:1, color:"#5ba060", description:"3 variables · Clean red herring · Clear clue trail"},
    detective: {stars:2, color:"#d4a84b", description:"4 variables · Ambiguous clues · Misleading witness"},
    inspector: {stars:3, color:"#e07040", description:"5 variables · Decoy testimony · 8 minutes only"},
  }[tier] || {stars:1, color:"#5ba060", description:""};

  return {
    id:           tier,
    label:        tier.charAt(0).toUpperCase() + tier.slice(1),
    ...tierMeta,
    tier,
    schemaVersion: d.schemaVersion || "1.0",
    caseNum:      d.caseNum || d.caseNumber || d.case_num || "",
    title:        d.title || "",
    emoji:        d.emoji || "🔍",
    setting:      d.setting || "",
    flavor,
    epilogue:     d.epilogue || "",
    timerSeconds: d.timerSeconds || (tier === "inspector" ? 480 : 600),
    theme:        d.theme || { accent:"#d4a84b", accentDim:"#6a5018", bg:"#08090a" },
    solution:     sol,
    categories:   cats,
    clues,
    tagline:      "Your daily ten minute mystery",
  };
}

function buildTiersFromCase(caseJson) {
  // caseJson may be a single tier or an array of tiers or an object with tier keys
  const tierKeys = ["rookie","detective","inspector"];

  // If it's an array, each element is a tier
  if (Array.isArray(caseJson)) {
    const built = {};
    caseJson.forEach(item => {
      const norm = normalizeTier(item);
      if (norm) built[norm.id] = norm;
    });
    if (Object.keys(built).length) return {...FALLBACK_TIERS, ...built};
  }

  // If it has tier keys directly
  if (caseJson.rookie || caseJson.detective || caseJson.inspector) {
    const built = {};
    tierKeys.forEach(k => {
      if (caseJson[k]) { const norm = normalizeTier(caseJson[k]); if (norm) built[k] = norm; }
    });
    if (Object.keys(built).length) return {...FALLBACK_TIERS, ...built};
  }

  // Single case — apply to all tiers (same narrative, same structure)
  const norm = normalizeTier(caseJson);
  if (!norm) return FALLBACK_TIERS;
  return {
    rookie:    {...norm, id:"rookie",    label:"Rookie",    tier:"rookie",    stars:1, color:"#5ba060", description:"3 variables · Clean red herring · Clear clue trail",    timerSeconds:600},
    detective: {...norm, id:"detective", label:"Detective", tier:"detective", stars:2, color:"#d4a84b", description:"4 variables · Ambiguous clues · Misleading witness",     timerSeconds:600},
    inspector: {...norm, id:"inspector", label:"Inspector", tier:"inspector", stars:3, color:"#e07040", description:"5 variables · Decoy testimony · 8 minutes only",         timerSeconds:480},
  };
}

// ─── CASE LOADER COMPONENT ───────────────────────────────────────────────────
function CaseLoader({ children }) {
  const [status, setStatus] = useState("loading"); // loading | ready | error

  useEffect(() => {
    const today = getTodayString();
    fetch(`/cases/${today}.json`)
      .then(res => {
        if (!res.ok) throw new Error(`No case for ${today}`);
        return res.json();
      })
      .then(data => {
        const newTiers = buildTiersFromCase(data);
        TIERS = newTiers;
        setStatus("ready");
      })
      .catch(() => {
        // No case for today — use fallback silently
        TIERS = FALLBACK_TIERS;
        setStatus("ready");
      });
  }, []);

  if (status === "loading") {
    return (
      <div style={{minHeight:"100vh",background:"#08090a",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontFamily:"Georgia,serif",fontSize:24,color:"#d4a84b",marginBottom:12}}>🔍</div>
          <div style={{fontFamily:"Georgia,serif",fontSize:16,color:"#6a5018",letterSpacing:"0.1em"}}>Opening the case file...</div>
        </div>
      </div>
    );
  }

  return children;
}

      <style>{`*{box-sizing:border-box;margin:0;padding:0}body{background:#08090a}button:focus{outline:none}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#272830;border-radius:2px}`}</style>
      {screen==="level"   && <LevelSelect  onSelect={handleSelect}/>}
      {screen==="game"    && <GameScreen   tierId={tierId} onSolve={r=>{setResult(r);setScreen("solved")}} onTimeout={()=>setScreen("timeout")} onReset={()=>setScreen("level")}/>}
      {screen==="timeout" && <TimeoutScreen tierId={tierId} onReset={()=>setScreen("level")}/>}
      {screen==="solved"  && <SolvedScreen result={result} onReset={handleReset}/>}
    </CaseLoader>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>

<script>
(function(){
  function showError(msg){
    var el=document.getElementById('loading');
    if(el) el.innerHTML='<div style="color:#e05050;font-size:14px;padding:40px 20px;text-align:center;font-family:sans-serif;max-width:400px;margin:0 auto"><div style="font-size:32px;margin-bottom:12px">&#9888;&#65039;</div><div>The game failed to load.</div><div style="margin-top:8px;font-size:11px;color:#707080;word-break:break-all;padding:8px;background:#161820;border-radius:6px">'+msg+'</div><button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#d4a84b;border:none;border-radius:8px;color:#08090a;cursor:pointer;font-size:14px;font-weight:bold">Refresh</button></div>';
  }
  window.addEventListener('load',function(){
    try{
      if(typeof sucrase==='undefined'){showError('Sucrase CDN failed to load.');return;}
      if(typeof React==='undefined'){showError('React CDN failed to load.');return;}
      var src=document.getElementById('jsx-src').textContent;
      var compiled=sucrase.transform(src,{transforms:['jsx']}).code;
      var s=document.createElement('script');
      s.textContent=compiled;
      document.head.appendChild(s);
    }catch(e){showError(e.message||String(e));}
  });
})();
</script>

</body>
</html>
