// ─── RESULT STORAGE HELPERS ───────────────────────────────────────────────────
function saveResult(date, data) {
  try {
    const stored = JSON.parse(localStorage.getItem('dw-results') || '{}');
    stored[date] = data;
    localStorage.setItem('dw-results', JSON.stringify(stored));
  } catch(e) {}
}

function loadResult(date) {
  try {
    const stored = JSON.parse(localStorage.getItem('dw-results') || '{}');
    return stored[date] || null;
  } catch(e) { return null; }
}

// ─── DAILY CASE LOADER ────────────────────────────────────────────────────────
// Fetches /cases/YYYY-MM-DD.json and normalizes it into TIERS format.
// Falls back to FALLBACK_TIERS (Last Order) if no case exists for today.

function getTodayString() {
  const d = new Date();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${d.getFullYear()}-${mm}-${dd}`;
}

function normItem(item) {
  if (!item) return {name:"",icon:"",detail:""};
  if (Array.isArray(item)) return {name:String(item[0]||""),icon:String(item[1]||""),detail:String(item[2]||"")};
  if (typeof item === "string") return {name:item,icon:"",detail:""};
  return {
    name:   item.name   || item.title  || item.label || item.value || "",
    icon:   item.icon   || item.emoji  || "",
    detail: item.detail || item.description || item.role || item.hint || "",
  };
}

function normalizeTier(d) {
  if (!d) return null;

  // Flavor
  const flavor = d.flavor || d.description || d.intro || d.premise || d.flavorText || d.synopsis || "";

  // Categories — handle array OR nested-object format
  let cats = [];
  const catsRaw = d.categories || [];
  if (!Array.isArray(catsRaw) && typeof catsRaw === "object") {
    Object.keys(catsRaw).forEach(catKey => {
      const catObj = catsRaw[catKey];
      if (!catObj || typeof catObj !== "object") return;
      const items = [];
      Object.keys(catObj).forEach(ik => {
        if (["name","label","icon","emoji","detail","description"].includes(ik)) return;
        const v = catObj[ik];
        if (v && typeof v === "object" && !Array.isArray(v)) items.push(normItem(v));
        else if (typeof v === "string") items.push({name:v,icon:"",detail:""});
      });
      if (!items.length) {
        (catObj.items||catObj.options||catObj.choices||[]).forEach(i=>items.push(normItem(i)));
      }
      cats.push({key:catKey, label:catObj.name||catObj.label||catKey, icon:catObj.icon||catObj.emoji||"", items});
    });
  } else {
    cats = catsRaw.map(cat => {
      if (Array.isArray(cat)) return {key:cat[0]||"",label:cat[1]||"",icon:cat[2]||"",items:(cat[3]||[]).map(normItem)};
      const items = (cat.items||cat.options||cat.choices||[]).map(normItem);
      return {key:cat.key||cat.id||"",label:cat.label||cat.title||cat.name||cat.key||"",icon:cat.icon||cat.emoji||"",items};
    });
  }

  // Clues — handle array OR object format
  let clues = [];
  const cluesRaw = d.clues || [];
  const cluesList = Array.isArray(cluesRaw) ? cluesRaw : Object.values(cluesRaw);
  clues = cluesList.map(cl => {
    if (!cl) return null;
    if (Array.isArray(cl)) return {id:cl[0]||"",type:cl[1]||"document",icon:cl[2]||"📋",heading:cl[3]||"",text:cl[4]||"",alone:cl[5]||"",links:cl[6]||[]};
    const linksRaw = cl.links || cl.connections || cl.pairs || [];
    const links = linksRaw.map(l => {
      if (typeof l === "string") return {with:l, insight:""};
      return {with:l.with||l.id||l.clue||"", insight:l.insight||l.combined||l.reveal||""};
    });
    return {
      id:      cl.id      || cl.clueId  || "",
      type:    cl.type    || cl.clueType || "document",
      icon:    cl.icon    || cl.emoji   || "📋",
      heading: cl.heading || cl.title   || cl.source || cl.name || "",
      text:    cl.text    || cl.content || cl.clue   || "",
      alone:   cl.alone   || cl.hint    || cl.interpretation || "",
      links,
    };
  }).filter(Boolean);

  // Solution — normalize key aliases
  const solRaw = d.solution || {};
  const sol = {...solRaw};
  const solAliases = {killer:"suspect",murderer:"suspect",culprit:"suspect",
    weapon:"method",cause:"method",evidence:"method",means:"method",instrument:"method",
    place:"location",where:"location",room:"location",scene:"location",
    time:"window",when:"window"};
  Object.keys(solAliases).forEach(ak => {
    if (sol[ak] !== undefined && sol[solAliases[ak]] === undefined) sol[solAliases[ak]] = sol[ak];
  });
  // Also align with actual category keys
  cats.forEach(cat => {
    if (sol[cat.key] === undefined) {
      if (sol[cat.key+"s"] !== undefined) sol[cat.key] = sol[cat.key+"s"];
      else if (cat.key.endsWith("s") && sol[cat.key.slice(0,-1)] !== undefined) sol[cat.key] = sol[cat.key.slice(0,-1)];
    }
  });

  const tier = d.tier || "rookie";
  const tierMeta = {
    rookie:    {stars:1, color:"#5ba060", description:"3 variables · Clean red herring · Clear clue trail"},
    detective: {stars:2, color:"#d4a84b", description:"4 variables · Ambiguous clues · Misleading witness"},
    inspector: {stars:3, color:"#e07040", description:"5 variables · Decoy testimony · 8 minutes only"},
  }[tier] || {stars:1, color:"#5ba060", description:""};

  return {
    id:           tier,
    label:        tier.charAt(0).toUpperCase() + tier.slice(1),
    ...tierMeta,
    tier,
    schemaVersion: d.schemaVersion || "1.0",
    caseNum:      d.caseNum || d.caseNumber || d.case_num || "",
    title:        d.title || "",
    emoji:        d.emoji || "🔍",
    setting:      d.setting || "",
    flavor,
    epilogue:     d.epilogue || "",
    timerSeconds: d.timerSeconds || (tier === "inspector" ? 480 : 600),
    theme:        d.theme || { accent:"#d4a84b", accentDim:"#6a5018", bg:"#08090a" },
    solution:     sol,
    categories:   cats,
    clues,
    tagline:      "Your daily ten minute mystery",
  };
}

function buildTiersFromCase(caseJson) {
  // caseJson may be a single tier or an array of tiers or an object with tier keys
  const tierKeys = ["rookie","detective","inspector"];

  // If it's an array, each element is a tier
  if (Array.isArray(caseJson)) {
    const built = {};
    caseJson.forEach(item => {
      const norm = normalizeTier(item);
      if (norm) built[norm.id] = norm;
    });
    if (Object.keys(built).length) return {...FALLBACK_TIERS, ...built};
  }

  // If it has tier keys directly
  if (caseJson.rookie || caseJson.detective || caseJson.inspector) {
    const built = {};
    tierKeys.forEach(k => {
      if (caseJson[k]) { const norm = normalizeTier(caseJson[k]); if (norm) built[k] = norm; }
    });
    if (Object.keys(built).length) return {...FALLBACK_TIERS, ...built};
  }

  // Single case — apply to all tiers (same narrative, same structure)
  const norm = normalizeTier(caseJson);
  if (!norm) return FALLBACK_TIERS;
  return {
    rookie:    {...norm, id:"rookie",    label:"Rookie",    tier:"rookie",    stars:1, color:"#5ba060", description:"3 variables · Clean red herring · Clear clue trail",    timerSeconds:600},
    detective: {...norm, id:"detective", label:"Detective", tier:"detective", stars:2, color:"#d4a84b", description:"4 variables · Ambiguous clues · Misleading witness",     timerSeconds:600},
    inspector: {...norm, id:"inspector", label:"Inspector", tier:"inspector", stars:3, color:"#e07040", description:"5 variables · Decoy testimony · 8 minutes only",         timerSeconds:480},
  };
}

// ─── CASE LOADER COMPONENT ───────────────────────────────────────────────────
function CaseLoader({ children, onReady }) {
  const [status, setStatus] = useState("loading");

  useEffect(() => {
    // Check for ?date= param (archive links) or use today
    var urlDate = new URLSearchParams(window.location.search).get('date');
    var today = (urlDate && /^[0-9]{4}-[0-9]{2}-[0-9]{2}$/.test(urlDate)) ? urlDate : getTodayString();
    console.log('[Whodunit] Date:', today, urlDate ? '(from URL)' : '(today)');
    const htmlLoader = document.getElementById('loading');
    if (htmlLoader) htmlLoader.style.display = 'none';

    const controller = new AbortController();
    const timer = setTimeout(() => {
      console.log('[Whodunit] Timeout - using fallback');
      controller.abort();
    }, 5000);

    fetch('/cases/' + today + '.json', { signal: controller.signal })
      .then(function(res) {
        clearTimeout(timer);
        console.log('[Whodunit] Status:', res.status);
        if (!res.ok) throw new Error('not found');
        return res.json();
      })
      .then(function(data) {
        console.log('[Whodunit] Loaded:', data.title || (data.rookie && data.rookie.title) || 'unknown');
        var newTiers = buildTiersFromCase(data);
        TIERS = newTiers;
        setStatus("ready");
        if (onReady) onReady();
      })
      .catch(function(e) {
        clearTimeout(timer);
        console.log('[Whodunit] Fallback:', e.message);
        TIERS = FALLBACK_TIERS;
        setStatus("ready");
        if (onReady) onReady();
      });
  }, []);

  if (status === "loading") {
    return (
      React.createElement('div', { style: {minHeight:"100vh",background:"#08090a",display:"flex",alignItems:"center",justifyContent:"center"},}
        , React.createElement('div', { style: {textAlign:"center"},}
          , React.createElement('div', { style: {fontFamily:"Georgia,serif",fontSize:24,color:"#d4a84b",marginBottom:12},}, "🔍")
          , React.createElement('div', { style: {fontFamily:"Georgia,serif",fontSize:16,color:"#6a5018",letterSpacing:"0.1em"},}, "Opening the case file..."   )
        )
      )
    );
  }

  return children;
}


function App() {
  const [screen,     setScreen]    = useState("level");
  const [tierId,     setTierId]    = useState(null);
  const [result,     setResult]    = useState(null);
  const [savedRes,   setSavedRes]  = useState(null);
  const [practice,   setPractice]  = useState(false);
  const [, forceUpdate] = useState(0);

  const today = getTodayString();

  const handleSelect = (id) => { setTierId(id); setScreen("game"); };
  const handleReset  = () => {
    setPractice(false);
    // Re-check if already played after reset
    const saved = loadResult(today);
    if (saved) { setSavedRes(saved); setScreen("already"); }
    else setScreen("level");
  };

  const handleSolve = (r) => {
    // Build save data
    const caseData = TIERS[r.tierId];
    const tierInfo = TIERS[r.tierId];
    const totalInsights = caseData.clues.reduce((n,c)=>n+(c.links&&c.links.length||0),0)/2;
    const timeUsed = (caseData.timerSeconds||600) - r.timeRemaining;
    const mm = String(Math.floor(timeUsed/60)).padStart(2,"0");
    const ss = String(timeUsed%60).padStart(2,"0");
    const score = Math.max(0,Math.round((r.timeRemaining/(caseData.timerSeconds||600))*100)-r.wrongCount*15-(r.hintsUsed||0)*5);
    const [rankIcon,rankLabel] = score>=80?["🏆","Beyond Doubt"]:score>=50?["🥈","Probable Cause"]:["🥉","Reasonable Doubt"];

    const tierDots = {rookie:"🟢",detective:"🟡",inspector:"🟠"}[r.tierId]||"🟢";
    const insightDots = Array(Math.round(totalInsights)).fill(0).map((_,i)=>i<r.foundInsights?"💡":"⬛").join("");
    const wrongDots  = r.wrongCount>0?" ❌".repeat(Math.min(r.wrongCount,3)):"";
    const hintDots   = (r.hintsUsed||0)>0?" 🔦".repeat(Math.min(r.hintsUsed,3)):"";
    const shareText  = [
      "🔍 Daily Whodunit",
      `${caseData.caseNum} · ${caseData.title}`,
      "",
      `${rankIcon} ${rankLabel}`,
      `${tierDots} ${tierInfo.label} · ${score} pts`,
      "",
      `⏱️ ${mm}:${ss}${wrongDots}${hintDots}`,
      insightDots,
      "",
      "thedailywhodunit.com",
    ].join("\n");

    const saveData = {
      score, rankIcon, rankLabel,
      tierLabel: tierInfo.label,
      tierId: r.tierId,
      timeStr: `${mm}:${ss}`,
      foundInsights: r.foundInsights,
      totalInsights: Math.round(totalInsights),
      wrongCount: r.wrongCount,
      hintsUsed: r.hintsUsed||0,
      shareText,
      caseTitle: caseData.title,
      caseNum: caseData.caseNum,
      date: today,
    };

    setResult(r);
    // Only save if not in practice mode
    if (!practice) {
      saveResult(today, saveData);
      setSavedRes(saveData);
    }
    setScreen("solved");
  };

  // Check for existing result on first load (after TIERS are ready)
  const handleReady = () => {
    forceUpdate(n => n+1);
    if (!practice) {
      const saved = loadResult(today);
      if (saved) { setSavedRes(saved); setScreen("already"); }
    }
  };

  return (
    React.createElement(CaseLoader, { onReady: handleReady,}
      , React.createElement('style', null, `*{box-sizing:border-box;margin:0;padding:0}body{background:#08090a}button:focus{outline:none}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#272830;border-radius:2px}`)
      , screen==="already"  && React.createElement(AlreadyPlayed, { savedResult: savedRes, onPractice: ()=>{setPractice(true);setScreen("level");}, onReset: handleReset,})
      , screen==="level"    && React.createElement(LevelSelect, {  onSelect: handleSelect, practice: practice,})
      , screen==="game"     && React.createElement(GameScreen, {   tierId: tierId, onSolve: handleSolve, onTimeout: ()=>setScreen("timeout"), onReset: handleReset, practice: practice,})
      , screen==="timeout"  && React.createElement(TimeoutScreen, { tierId: tierId, onReset: handleReset,})
      , screen==="solved"   && React.createElement(SolvedScreen, { result: result, onReset: handleReset,})
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

</script>
